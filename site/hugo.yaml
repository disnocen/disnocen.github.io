baseURL: "https://disnocen.github.io/"
languageCode: en-us
title: disnocen
theme: ["PaperMod"]

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 8

outputs:
  home:
    - HTML
    - RSS
    - JSON

caches:
  images:
    dir: :cacheDir/images

minify:
  disableXML: true
  minifyOutput: true

taxonomies:
  category: categories
  tag: tags

params:
  env: production
  title: disnocen
  description: "Personal notes on cryptography research and local AI model experiments."
  keywords:
    - cryptography
    - protocol design
    - garbled circuits
    - threshold signatures
    - local LLMs
    - AI research
  author: Fadi
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false
  disableSpecial1stPost: true
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  comments: false
  hideSummary: false

  homeInfoParams:
    Title: disnocen
    Content: "Cryptography research notes, protocol design work, and local AI model experiments."

  socialIcons:
    - name: github
      url: "https://github.com/disnocen"

  editPost:
    URL: "https://github.com/disnocen/disnocen.github.io/tree/master/site/content"
    Text: "Suggest changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys:
      - title
      - permalink
      - summary
      - content

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"
    theme_color: "#0f172a"
    msapplication_TileColor: "#0f172a"

menu:
  main:
    - identifier: posts
      name: posts
      url: /posts/
      weight: 10
    - identifier: archives
      name: archives
      url: /archives/
      weight: 20
    - identifier: search
      name: search
      url: /search/
      weight: 30
    - identifier: tags
      name: tags
      url: /tags/
      weight: 40
    - identifier: about
      name: about
      url: /about/
      weight: 50

markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false
